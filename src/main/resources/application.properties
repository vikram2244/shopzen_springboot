# ========================================
# Application Configuration
# ========================================
spring.application.name=ecommerce-api

# ========================================
# Profile - Default to prod for production safety
# ========================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# ========================================
# Server Configuration
# ========================================
server.port=${PORT:8080}
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always
server.tomcat.threads.max=200
server.tomcat.connection-timeout=30000

# ========================================
# URL Configuration
# ========================================
app.frontend-url=${FRONTEND_URL:https://shopgen.netlify.app}
app.base-url=${APP_BASE_URL:https://shopzen-springboot.onrender.com}

# ========================================
# Database Configuration - Environment Only
# ========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# Hikari Connection Pool - Optimized
# ========================================
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.auto-commit=true

# ========================================
# JPA/Hibernate - Optimized
# ========================================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# ========================================
# Flyway - Disabled by default
# ========================================
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# ========================================
# CORS Configuration
# ========================================
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed.headers=Authorization,Content-Type,Accept,X-Requested-With
cors.allow-credentials=true
cors.max-age=3600

# ========================================
# JWT Security - Environment Only
# ========================================
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ========================================
# Email - Brevo (Environment Only)
# ========================================
brevo.sender.name=ShopZen
brevo.enabled=${BREVO_ENABLED:true}

# SMTP - Base config
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ========================================
# Razorpay Payment - Environment Only
# ========================================

# ========================================
# Logging - Configurable
# ========================================
logging.level.com.shopzen=${LOG_LEVEL:INFO}
logging.level.com.zaxxer.hikari=${HIKARI_LOG_LEVEL:INFO}
logging.level.org.hibernate=${HIBERNATE_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}

# ========================================
# API Documentation
# ========================================
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# ========================================
# Jackson
# ========================================
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ

# ========================================
# Multipart
# ========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# Encoding
# ========================================
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true

# ========================================
# Session & Cookie
# ========================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# ========================================
# Actuator
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ========================================
# Error Handling
# ========================================
server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

spring.main.banner-mode=off
spring.main.lazy-initialization=false
spring.main.allow-circular-references=true