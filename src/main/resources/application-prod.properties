# ========================================
# Production Profile Configuration
# ========================================

# Server
server.port=${PORT:10000}

# URL Configuration
app.frontend-url=${FRONTEND_URL}
app.base-url=${APP_BASE_URL}

# Database - From Environment
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Database Pool - Production (Optimized)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000

# Hibernate - Production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Flyway - Enabled for production
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Email - Brevo
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${MAIL_USERNAME}
brevo.enabled=true

spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${BREVO_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS - Production
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://shopgen.netlify.app,https://shopzen.netlify.app}
cors.allowed.headers=*

# JWT - Production (Strong secret required)
jwt.secret=${JWT_SECRET}
spring.security.jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Razorpay - Production keys
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# Logging - Production
logging.level.com.shopzen=INFO
logging.level.com.zaxxer.hikari=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# Swagger - Disabled in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Session & Cookie - Production (Secure)
server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Health Monitoring
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always